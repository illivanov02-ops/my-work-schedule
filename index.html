<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>График Смен Онлайн — Календарь работы 2/2, 3/3, 5/2</title>
    <meta name="description" content="Бесплатный сервис для расчета графика смен. Удобный календарь для работы 2 через 2, 3 через 3. Планируйте смены и встречи онлайн.">
    <meta name="keywords" content="график смен, календарь работы, рассчитать график 2/2, график 3/3, онлайн календарь смен">
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; padding: 10px; color: var(--text); overflow-x: hidden; }
        
        .site-header { max-width: 1000px; margin: 5px auto 10px; display: flex; align-items: center; gap: 8px; padding: 0 5px; }
        .logo-icon { font-size: 24px; }
        .logo-text { font-size: 20px; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }

        #calendar-container { max-width: 1000px; margin: 0 auto 20px auto; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        .schedule-maker { background: #f1f5f9; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 4px; font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; }
        .input-group input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; outline: none; width: 100%; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h2 { margin: 0; font-size: 1.25rem; font-weight: 800; color: #0f172a; }

        button { padding: 12px 18px; cursor: pointer; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; font-size: 14px; transition: background 0.2s; }
        .btn-danger { background: var(--danger); }

        .stats-panel { background: #eff6ff; padding: 10px 15px; border-radius: 8px; margin-bottom: 15px; display: flex; gap: 15px; font-size: 12px; font-weight: 700; color: var(--primary); border: 1px solid #dbeafe; }

        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 8px; }
        .weekdays div { font-weight: 700; text-align: center; color: #94a3b8; font-size: 11px; text-transform: uppercase; }

        .days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; width: 100%; }
        .day { min-height: 95px; border: 1px solid var(--border); border-radius: 10px; padding: 4px; background: #fff; cursor: pointer; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .day-number { font-weight: 800; font-size: 12px; color: #94a3b8; text-align: right; margin-bottom: 3px; }
        .today { border: 2px solid var(--primary); background: #f0f7ff; }

        .event { 
            color: white; padding: 4px 5px; border-radius: 5px; font-size: 11px; margin-top: 2px; 
            font-weight: 700; text-align: left; overflow: hidden; white-space: normal; 
            line-height: 1.1; word-break: break-word; width: 100%; display: block;
        }
        .event-shift { background: var(--primary); }
        .event-meeting { background: var(--secondary); }

        @media (max-width: 600px) {
            body { padding: 5px; }
            #calendar-container { padding: 10px 5px; border-radius: 0; margin: 0 -5px 20px -5px; width: calc(100% + 10px); }
            .day { min-height: 85px; border-radius: 6px; padding: 2px; }
            .event { font-size: 9px; padding: 2px 3px; }
            .schedule-maker { grid-template-columns: 1fr 1fr; }
            .btn-group { grid-column: span 2; display: flex; gap: 6px; }
            .btn-group button { flex: 1; }
        }

        #modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); z-index: 1000; backdrop-filter: blur(4px); padding: 10px; }
        .modal-content { background: white; width: 100%; max-width: 340px; margin: 15vh auto; padding: 25px; border-radius: 16px; }
        .modal-content select, .modal-content input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; }
    </style>
</head>
<body>

<header class="site-header">
    <span class="logo-icon">📅</span>
    <span class="logo-text">График Смен Онлайн</span>
</header>

<div id="calendar-container">
    <div class="schedule-maker">
        <div class="input-group"><label>Начало цикла</label><input type="date" id="sched-start"></div>
        <div class="input-group"><label>Тип</label><input type="text" id="sched-title" value="Смена"></div>
        <div class="input-group"><label>Работа</label><input type="number" id="sched-work" value="2"></div>
        <div class="input-group"><label>Отдых</label><input type="number" id="sched-rest" value="2"></div>
        <div class="btn-group" style="display: flex; gap: 8px;">
            <button onclick="generateSchedule()" style="flex: 1.5;">Заполнить</button>
            <button class="btn-danger" onclick="clearAll()" style="flex: 1;">Очистить</button>
        </div>
    </div>

    <div class="header">
        <button onclick="changeMonth(-1)">←</button>
        <h2 id="month-year"></h2>
        <button onclick="changeMonth(1)">→</button>
    </div>
    
    <div class="stats-panel" id="stats-panel"></div>

    <div class="weekdays">
        <div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div>Сб</div><div>Вс</div>
    </div>
    <div class="days" id="days"></div>
</div>

<div id="modal">
    <div class="modal-content">
        <h3 style="margin: 0 0 10px 0;">Добавить запись</h3>
        <select id="event-type">
            <option value="shift">Смена (Синий)</option>
            <option value="meeting">Встреча (Зеленый)</option>
        </select>
        <input type="text" id="event-title" placeholder="Название записи">
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button class="btn-danger" onclick="closeModal()" style="flex: 1;">Отмена</button>
            <button onclick="saveEvent()" style="flex: 1.5;">Сохранить</button>
        </div>
    </div>
</div>

<script>
    let currentDate = new Date();
    let selectedDateStr = "";
    let events = JSON.parse(localStorage.getItem("myWebCalendar")) || {};

    function renderCalendar() {
        const daysContainer = document.getElementById("days");
        const monthYear = document.getElementById("month-year");
        const statsPanel = document.getElementById("stats-panel");
        daysContainer.innerHTML = "";

        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        let startDay = firstDay === 0 ? 6 : firstDay - 1;

        const monthNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        monthYear.innerText = `${monthNames[month]} ${year}`;

        let shifts = 0, meetings = 0;
        const realToday = new Date().toISOString().split('T')[0];

        for (let i = 0; i < startDay; i++) daysContainer.appendChild(document.createElement("div"));

        for (let i = 1; i <= daysInMonth; i++) {
            const dayDiv = document.createElement("div");
            dayDiv.className = "day";
            const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
            if (dateKey === realToday) dayDiv.classList.add("today");
            dayDiv.innerHTML = `<div class="day-number">${i}</div>`;
            
            if (events[dateKey]) {
                events[dateKey].forEach((ev, idx) => {
                    const evDiv = document.createElement("div");
                    evDiv.className = `event ${ev.isShift ? 'event-shift' : 'event-meeting'}`;
                    evDiv.innerText = ev.title;
                    ev.isShift ? shifts++ : meetings++;
                    evDiv.onclick = (e) => {
                        e.stopPropagation();
                        if(confirm(`Удалить "${ev.title}"?`)) {
                            events[dateKey].splice(idx, 1);
                            if(!events[dateKey].length) delete events[dateKey];
                            save(); renderCalendar();
                        }
                    };
                    dayDiv.appendChild(evDiv);
                });
            }
            dayDiv.onclick = () => openModal(dateKey);
            daysContainer.appendChild(dayDiv);
        }
        statsPanel.innerHTML = `<span>📅 Смен: ${shifts}</span> <span>📝 Встреч: ${meetings}</span>`;
    }

    function save() { localStorage.setItem("myWebCalendar", JSON.stringify(events)); }
    function changeMonth(dir) { currentDate.setMonth(currentDate.getMonth() + dir); renderCalendar(); }
    function closeModal() { document.getElementById("modal").style.display = "none"; }
    function openModal(date) { selectedDateStr = date; document.getElementById("event-title").value = ""; document.getElementById("modal").style.display = "block"; }

    function generateSchedule() {
        const start = document.getElementById("sched-start").value;
        const work = parseInt(document.getElementById("sched-work").value);
        const rest = parseInt(document.getElementById("sched-rest").value);
        const title = document.getElementById("sched-title").value;
        if (!start || isNaN(work)) return alert("Укажите начало цикла");
        let d = new Date(start);
        for (let i = 0; i < 365; i++) {
            if (i % (work + rest) < work) {
                let key = d.toISOString().split('T')[0];
                if (!events[key]) events[key] = [];
                if (!events[key].some(e => e.isShift)) events[key].push({ title, isShift: true });
            }
            d.setDate(d.getDate() + 1);
        }
        save(); renderCalendar();
    }

    function saveEvent() {
        const title = document.getElementById("event-title").value;
        const type = document.getElementById("event-type").value;
        if (!title) return;
        if (!events[selectedDateStr]) events[selectedDateStr] = [];
        events[selectedDateStr].push({ title, isShift: (type === 'shift') });
        save(); closeModal(); renderCalendar();
    }

    function clearAll() { if(confirm("Очистить все данные из календаря?")) { events = {}; save(); renderCalendar(); } }
    renderCalendar();
</script>
</body>
</html>
