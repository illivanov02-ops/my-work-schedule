<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>График смен онлайн — Удобный планировщик 2/2, 3/3, 5/2</title>
    <meta name="description" content="Бесплатный сервис для расчета рабочих смен. Удобный календарь онлайн.">
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📅</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; padding: 10px; color: var(--text); line-height: 1.5; }
        
        .site-header { max-width: 1000px; margin: 10px auto; display: flex; align-items: center; gap: 10px; padding: 0 10px; }
        .logo-icon { font-size: 28px; }
        .logo-text { font-size: 22px; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }

        #calendar-container { max-width: 1000px; margin: 0 auto 30px auto; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        /* Панель управления */
        .schedule-maker { background: #f1f5f9; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 4px; font-size: 12px; font-weight: 600; color: #64748b; }
        .input-group input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; outline: none; transition: border 0.2s; }
        .input-group input:focus { border-color: var(--primary); }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h2 { margin: 0; font-size: 1.25rem; color: #0f172a; font-weight: 700; }

        button { padding: 10px 16px; cursor: pointer; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; transition: all 0.2s; font-size: 14px; white-space: nowrap; }
        button:active { transform: scale(0.98); }
        .btn-danger { background: var(--danger); }
        .btn-print { background: #64748b; }

        .stats-panel { background: #eff6ff; padding: 10px 15px; border-radius: 8px; margin-bottom: 15px; display: flex; gap: 15px; font-size: 13px; font-weight: 600; color: var(--primary); border: 1px solid #dbeafe; }

        /* Календарная сетка */
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 8px; }
        .weekdays div { font-weight: 700; text-align: center; color: #94a3b8; font-size: 11px; text-transform: uppercase; }

        .days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .day { min-height: 85px; border: 1px solid var(--border); border-radius: 8px; padding: 4px; background: #fff; cursor: pointer; display: flex; flex-direction: column; transition: background 0.2s; }
        .day-number { font-weight: 700; font-size: 12px; color: #94a3b8; margin-bottom: 4px; text-align: right; }
        .today { border: 2px solid var(--primary); background: #f0f7ff; }
        .today .day-number { color: var(--primary); }

        .event { color: white; padding: 2px 4px; border-radius: 4px; font-size: 10px; margin-top: 2px; font-weight: 700; text-align: center; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .event-shift { background: var(--primary); }
        .event-meeting { background: var(--secondary); }

        /* Мобильная адаптация */
        @media (max-width: 600px) {
            body { padding: 5px; }
            #calendar-container { padding: 12px; border-radius: 12px; }
            .day { min-height: 60px; padding: 2px; border-radius: 6px; }
            .day-number { font-size: 10px; margin-bottom: 2px; }
            .event { font-size: 8px; padding: 1px 2px; letter-spacing: -0.2px; }
            .logo-text { font-size: 18px; }
            button { padding: 10px 12px; font-size: 12px; }
            .schedule-maker { padding: 10px; grid-template-columns: 1fr 1fr; }
            .input-group:last-of-type { grid-column: span 2; }
            .btn-group { grid-column: span 2; display: flex; gap: 5px; }
            .btn-group button { flex: 1; }
        }

        /* Модальное окно */
        #modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); z-index: 1000; backdrop-filter: blur(4px); padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 340px; margin: 10vh auto; padding: 25px; border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .modal-content input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; }

        @media print {
            .site-header, .schedule-maker, .header button, .btn-danger, .btn-print, #modal, .seo-text { display: none !important; }
            body { background: white; }
            #calendar-container { box-shadow: none; border: none; width: 100%; }
            .day { border: 1px solid #ccc; min-height: 70px; }
        }
    </style>
</head>
<body>

<header class="site-header">
    <div class="logo-icon">📅</div>
    <div class="logo-text">График Смен</div>
</header>

<div id="calendar-container">
    <div class="schedule-maker">
        <div class="input-group">
            <label>Начало цикла</label>
            <input type="date" id="sched-start">
        </div>
        <div class="input-group">
            <label>Название</label>
            <input type="text" id="sched-title" value="Смена">
        </div>
        <div class="input-group">
            <label>Работа</label>
            <input type="number" id="sched-work" value="2">
        </div>
        <div class="input-group">
            <label>Отдых</label>
            <input type="number" id="sched-rest" value="2">
        </div>
        <div class="btn-group" style="display: flex; gap: 8px; width: 100%;">
            <button onclick="generateSchedule()" style="flex: 2;">Заполнить</button>
            <button class="btn-print" onclick="window.print()" style="flex: 1;">Печать</button>
            <button class="btn-danger" onclick="clearAll()" style="flex: 0.5;">×</button>
        </div>
    </div>

    <div class="header">
        <button onclick="changeMonth(-1)">←</button>
        <h2 id="month-year"></h2>
        <button onclick="changeMonth(1)">→</button>
    </div>
    
    <div class="stats-panel" id="stats-panel"></div>

    <div class="weekdays">
        <div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div>Сб</div><div>Вс</div>
    </div>
    <div class="days" id="days"></div>
</div>

<div class="seo-text" style="max-width: 1000px; margin: 20px auto; padding: 20px; color: #94a3b8; font-size: 12px; text-align: center;">
    © 2026 grafik-smen.online — бесплатный расчет рабочих графиков
</div>

<div id="modal">
    <div class="modal-content">
        <h3 style="margin: 0 0 10px 0;">Новое событие</h3>
        <input type="text" id="event-title" placeholder="Что сделать?">
        <input type="time" id="event-time" value="09:00">
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button class="btn-danger" onclick="closeModal()" style="flex: 1;">Отмена</button>
            <button onclick="saveEvent()" style="flex: 1.5;">Сохранить</button>
        </div>
    </div>
</div>

<script>
    let currentDate = new Date();
    let selectedDateStr = "";
    let events = JSON.parse(localStorage.getItem("myWebCalendar")) || {};

    function renderCalendar() {
        const daysContainer = document.getElementById("days");
        const monthYear = document.getElementById("month-year");
        const statsPanel = document.getElementById("stats-panel");
        daysContainer.innerHTML = "";

        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        let startDay = firstDay === 0 ? 6 : firstDay - 1;

        const monthNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        monthYear.innerText = `${monthNames[month]} ${year}`;

        let shiftsCount = 0;
        let meetingsCount = 0;
        const realToday = new Date();

        for (let i = 0; i < startDay; i++) {
            daysContainer.appendChild(document.createElement("div"));
        }

        for (let i = 1; i <= daysInMonth; i++) {
            const dayDiv = document.createElement("div");
            dayDiv.classList.add("day");
            const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
            
            if (year === realToday.getFullYear() && month === realToday.getMonth() && i === realToday.getDate()) {
                dayDiv.classList.add("today");
            }
            
            dayDiv.innerHTML = `<div class="day-number">${i}</div>`;
            
            if (events[dateKey]) {
                events[dateKey].forEach((event, index) => {
                    const eventDiv = document.createElement("div");
                    eventDiv.classList.add("event", event.isShift ? "event-shift" : "event-meeting");
                    eventDiv.innerText = event.isShift ? event.title : event.title;
                    event.isShift ? shiftsCount++ : meetingsCount++;
                    dayDiv.appendChild(eventDiv);
                });
            }

            dayDiv.onclick = () => openModal(dateKey);
            daysContainer.appendChild(dayDiv);
        }
        statsPanel.innerHTML = `<span>📅 Смен: ${shiftsCount}</span> <span>📝 Встреч: ${meetingsCount}</span>`;
    }

    function save() { localStorage.setItem("myWebCalendar", JSON.stringify(events)); }
    function changeMonth(dir) { currentDate.setMonth(currentDate.getMonth() + dir); renderCalendar(); }
    
    function generateSchedule() {
        const start = document.getElementById("sched-start").value;
        const work = parseInt(document.getElementById("sched-work").value);
        const rest = parseInt(document.getElementById("sched-rest").value);
        const title = document.getElementById("sched-title").value;

        if (!start || isNaN(work)) return alert("Укажите дату начала");

        let d = new Date(start);
        for (let i = 0; i < 365; i++) {
            if (i % (work + rest) < work) {
                let key = d.toISOString().split('T')[0];
                if (!events[key]) events[key] = [];
                if (!events[key].some(e => e.isShift)) events[key].push({ title, isShift: true });
            }
            d.setDate(d.getDate() + 1);
        }
        save(); renderCalendar();
    }

    function clearAll() { if(confirm("Очистить все данные?")) { events = {}; save(); renderCalendar(); } }
    function openModal(date) { selectedDateStr = date; document.getElementById("modal").style.display = "block"; }
    function closeModal() { document.getElementById("modal").style.display = "none"; }
    function saveEvent() {
        const title = document.getElementById("event-title").value;
        if (!title) return;
        if (!events[selectedDateStr]) events[selectedDateStr] = [];
        events[selectedDateStr].push({ title, time: document.getElementById("event-time").value, isShift: false });
        save(); closeModal(); renderCalendar();
    }

    renderCalendar();
</script>
</body>
</html>
